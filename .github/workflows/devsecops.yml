name: DevSecOps Pipeline

# Kick off on every push or PR to main — keeps things honest
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  # --- Static Analysis: Bandit ---
  # Bandit reads through our Python source and flags anything that looks sketchy —
  # hardcoded passwords, dodgy subprocess calls, that sort of thing.
  sast-bandit:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      # This is what the gate sees — the project's own code, not the seeded fixture.
      - name: Run Bandit scan (project code)
        run: bandit -r scripts/ -f json -o reports/bandit_report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: reports/bandit_report.json

      # test_app/ is a deliberately vulnerable fixture used for the dissertation's
      # precision/recall research (docs/RESEARCH.md) — informational only, never gates.
      - name: Run Bandit scan (seeded research fixture)
        run: bandit -r test_app/ -f json -o reports/bandit_seeded_report.json || true

      - name: Upload Bandit seeded-fixture report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-seeded-report
          path: reports/bandit_seeded_report.json

  # --- Static Analysis: Semgrep ---
  # Semgrep is our second pair of eyes on the code — it catches patterns Bandit misses
  # and runs against a curated Python ruleset.
  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      # This is what the gate sees — the project's own code, not the seeded fixture.
      - name: Run Semgrep scan (project code)
        run: |
          semgrep --config=p/python --json \
            --output reports/semgrep_report.json \
            scripts/ || true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep_report.json

      # test_app/ is a deliberately vulnerable fixture used for the dissertation's
      # precision/recall research (docs/RESEARCH.md) — informational only, never gates.
      - name: Run Semgrep scan (seeded research fixture)
        run: |
          semgrep --config=p/python --json \
            --output reports/semgrep_seeded_report.json \
            test_app/ || true

      - name: Upload Semgrep seeded-fixture report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-seeded-report
          path: reports/semgrep_seeded_report.json

  # --- Dynamic Analysis: OWASP ZAP ---
  # ZAP actually fires HTTP requests at the running app, so we spin Flask up first,
  # wait for it to be ready, then let ZAP loose on it. Think of it as a robot pentester.
  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flask
        run: pip install flask==3.1.1

      # Start Flask in the background and poll until it responds — avoids race conditions
      - name: Start Flask app
        run: |
          cd test_app
          nohup python app.py > /tmp/flask.log 2>&1 &
          echo "Waiting for Flask to start..."
          for i in {1..15}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "Flask is up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -v http://localhost:5000 || (cat /tmp/flask.log && exit 1)

      - name: Create reports directory
        run: mkdir -p reports

      # Baseline scan — not a full spider, but good enough to catch the obvious stuff
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:5000"
          fail_action: false
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-J zap_report.json"
        continue-on-error: true

      # ZAP drops its report in the workspace root, so we move it into reports/
      - name: Move ZAP report to reports folder
        if: always()
        run: |
          if [ -f zap_report.json ]; then
            mv zap_report.json reports/zap_report.json
            echo "ZAP report moved successfully"
          else
            echo "No ZAP report found — creating empty placeholder"
            echo '{"site":[]}' > reports/zap_report.json
          fi

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap_report.json

  # --- Software Composition Analysis: pip-audit ---
  # Checks our Python dependencies against known CVEs. Catches the "we forgot to update
  # a library" class of vulnerability before it bites us in production.
  sca-pip-audit:
    name: SCA - pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      # This is what the gate sees — the project's own dependencies, not the seeded fixture's.
      - name: Run pip-audit scan (project deps)
        run: pip-audit -r requirements.txt --format json -o reports/pip_audit_report.json || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: reports/pip_audit_report.json

      # test_app/ is a deliberately vulnerable fixture used for the dissertation's
      # precision/recall research (docs/RESEARCH.md) — informational only, never gates.
      - name: Run pip-audit scan (seeded research fixture)
        run: pip-audit -r test_app/requirements.txt --format json -o reports/pip_audit_seeded_report.json || true

      - name: Upload pip-audit seeded-fixture report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-seeded-report
          path: reports/pip_audit_seeded_report.json

  # --- Container / IaC Scan: Trivy ---
  # Trivy looks at our Dockerfiles and config files for misconfigurations —
  # things like running as root, exposed ports, or missing health checks.
  container-scan-trivy:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: reports/trivy_report.json
          exit-code: "0"

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: reports/trivy_report.json

  # --- Secrets Scan: Gitleaks ---
  # Trawls the full git history for accidentally committed secrets — API keys, tokens,
  # passwords. fetch-depth: 0 is important here so we see every commit, not just HEAD.
  secrets-scan-gitleaks:
    name: Secrets Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD":/repo ghcr.io/gitleaks/gitleaks:latest \
            detect --source /repo --report-format json \
            --report-path /repo/reports/gitleaks_report.json \
            --exit-code 0 || true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: reports/gitleaks_report.json

  # --- Security Gate ---
  # This is the decision point. Reports from the project's own code (not the
  # seeded test_app/ fixture — that's research-only, see the *-seeded-report
  # artifacts) land here and get fed into aggregate_results.py, which counts
  # HIGH/CRITICAL findings. If the count is too high, the gate fails and the
  # build is blocked. Nothing ships until it's clean.
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast-bandit, sast-semgrep, sca-pip-audit, container-scan-trivy, secrets-scan-gitleaks]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: reports/

      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports/

      # These three are optional — if the upstream job was skipped they won't exist,
      # and we don't want that to crater the gate itself
      - name: Download pip-audit report
        uses: actions/download-artifact@v4
        with:
          name: pip-audit-report
          path: reports/
        continue-on-error: true

      - name: Download Trivy report
        uses: actions/download-artifact@v4
        with:
          name: trivy-report
          path: reports/
        continue-on-error: true

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: reports/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Run the aggregation script — it writes findings.json and exits non-zero on HIGH/CRITICAL
      - name: Run aggregation and security gate
        id: gate
        run: python scripts/aggregate_results.py
        continue-on-error: true

      - name: Upload unified findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-findings
          path: reports/findings.json

      # Final enforcement — if the gate script failed, block the build here with a clear message
      - name: Enforce security gate result
        if: always()
        run: |
          if [ "${{ steps.gate.outcome }}" == "failure" ]; then
            echo "Security gate failed — HIGH/CRITICAL findings detected. Blocking build."
            exit 1
          fi
          echo "Security gate passed."

  # --- Dashboard Generator ---
  # Takes the unified findings and renders a nice HTML report so humans can actually
  # read the results without staring at raw JSON. Runs last, even if the gate failed,
  # so there's always a report to look at.
  generate-dashboard:
    name: Generate Report Dashboard
    runs-on: ubuntu-latest
    needs: [security-gate]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download unified findings
        uses: actions/download-artifact@v4
        with:
          name: unified-findings
          path: reports/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate HTML dashboard
        run: python scripts/generate_report.py

      # Pages serves a directory, and we want the dashboard reachable at both the
      # bare site URL and an explicit /dashboard.html — so ship it as both files.
      - name: Prepare Pages site
        run: |
          mkdir -p pages_site
          cp reports/dashboard.html pages_site/index.html
          cp reports/dashboard.html pages_site/dashboard.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages_site

  # --- Publish Dashboard ---
  # Deploys the dashboard built above to GitHub Pages, so there's one stable URL
  # that always shows the latest run — no artifact zip to download.
  deploy-pages:
    name: Publish Dashboard to GitHub Pages
    runs-on: ubuntu-latest
    needs: [generate-dashboard]
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # --- Link Dashboard on PR ---
  # Drops (or updates) a single comment on the PR pointing at the live dashboard,
  # so reviewers don't have to leave the PR to see scan results.
  comment-dashboard-link:
    name: Link Dashboard on PR
    runs-on: ubuntu-latest
    needs: [deploy-pages, security-gate]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment dashboard link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- devsecops-dashboard-link -->';
            const pageUrl = '${{ needs.deploy-pages.outputs.page_url }}';
            const gatePassed = '${{ needs.security-gate.result }}' === 'success';
            const body = [
              marker,
              '### DevSecOps Trust Gate',
              '',
              `Security gate: **${gatePassed ? 'passed' : 'failed'}**`,
              '',
              `[Open the live dashboard](${pageUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
