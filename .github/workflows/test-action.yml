name: Test Action (dogfood)

# Smoke test that the packaged action resolves and runs end-to-end via the
# published tag, exactly as the README's Quick Start instructs external users.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: xkobxx/devsecops-dissertation@v1.0.0
        with:
          target: .
          fail-on: none
